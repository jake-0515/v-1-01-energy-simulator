/* ===== V단원. 에너지와 수송 기술의 세계 - 공용 스타일 ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #27ae60;
  --primary-dark: #1e8449;
  --primary-light: #a9dfbf;
  --accent: #f39c12;
  --accent-dark: #d68910;
  --blue: #2980b9;
  --blue-dark: #1a5276;
  --red: #e74c3c;
  --purple: #8e44ad;
  --teal: #16a085;
  --bg: #f0fff4;
  --surface: #ffffff;
  --text: #1a2e1a;
  --text-light: #5d6d5d;
  --border: #b2dfdb;
  --shadow: 0 8px 32px rgba(39, 174, 96, 0.12);
  --shadow-lg: 0 16px 48px rgba(39, 174, 96, 0.22);
}

html, body {
  font-family: 'Pretendard', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  font-size: 16px;
}

h1, h2, h3 { font-weight: 800; letter-spacing: -0.02em; }

/* ── 헤더 ── */
.app-header {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  padding: 20px 32px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.app-header h1 {
  font-size: clamp(17px, 3vw, 26px);
  display: flex; align-items: center; gap: 10px;
}
.app-header .subtitle { font-size: 13px; opacity: 0.88; font-weight: 500; }
.app-header nav a {
  color: white;
  text-decoration: none;
  font-weight: 700;
  padding: 8px 16px;
  border-radius: 999px;
  background: rgba(255,255,255,0.2);
  transition: background 0.2s;
  font-size: 14px;
}
.app-header nav a:hover { background: rgba(255,255,255,0.35); }

/* ── 컨테이너 ── */
.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 32px 24px 80px;
}

/* ── 카드 ── */
.card {
  background: var(--surface);
  border-radius: 24px;
  padding: 28px;
  box-shadow: var(--shadow);
  border: 2px solid var(--border);
}

/* ── 버튼 ── */
.btn {
  background: var(--primary);
  color: white;
  border: none;
  padding: 14px 28px;
  border-radius: 999px;
  font-weight: 800;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  box-shadow: 0 4px 16px rgba(39,174,96,0.3);
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(39,174,96,0.4); }
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn.btn-secondary { background: white; color: var(--primary-dark); border: 2px solid var(--primary); box-shadow: none; }
.btn.btn-accent  { background: var(--accent); box-shadow: 0 4px 16px rgba(243,156,18,0.3); }
.btn.btn-blue    { background: var(--blue);   box-shadow: 0 4px 16px rgba(41,128,185,0.3); }
.btn.btn-red     { background: var(--red);    box-shadow: 0 4px 16px rgba(231,76,60,0.3); }

/* ── 배지 ── */
.badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 700;
  background: var(--primary);
  color: white;
}
.badge.amber  { background: var(--accent); }
.badge.blue   { background: var(--blue); }
.badge.purple { background: var(--purple); }
.badge.red    { background: var(--red); }
.badge.teal   { background: var(--teal); }

/* ── 학습 목표 박스 ── */
.objective-box {
  background: linear-gradient(135deg, #d5f5e3 0%, #a9dfbf 100%);
  border-radius: 20px;
  padding: 24px 28px;
  margin-bottom: 32px;
  border-left: 8px solid var(--primary);
}
.objective-box h2 { color: var(--primary-dark); font-size: 22px; margin-bottom: 12px; }
.objective-box ul { list-style: none; padding: 0; }
.objective-box li {
  padding: 6px 0 6px 30px;
  position: relative;
  font-weight: 600;
  font-size: 16px;
}
.objective-box li::before { content: "🎯"; position: absolute; left: 0; }

/* ── 활동 그리드 ── */
.activity-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.activity-card {
  background: white;
  border-radius: 24px;
  padding: 28px;
  border: 3px solid var(--border);
  text-decoration: none;
  color: inherit;
  display: block;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}
.activity-card::before {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent, rgba(39,174,96,0.06));
  opacity: 0; transition: opacity 0.25s;
}
.activity-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); border-color: var(--primary); }
.activity-card:hover::before { opacity: 1; }
.activity-card .icon { font-size: 52px; margin-bottom: 14px; display: block; }
.activity-card h3 { font-size: 22px; margin-bottom: 10px; }
.activity-card p { color: var(--text-light); font-size: 15px; line-height: 1.55; }
.activity-card .go { margin-top: 14px; color: var(--primary-dark); font-weight: 700; font-size: 14px; }

/* ── 토스트 ── */
.toast {
  position: fixed; top: 20px; left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: white; padding: 14px 24px;
  border-radius: 999px; box-shadow: var(--shadow-lg);
  font-weight: 700; z-index: 1000; transition: transform 0.3s;
}
.toast.show  { transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--primary-dark); color: white; }
.toast.error   { background: var(--red); color: white; }

/* ── 섹션 헤더 ── */
.section-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 24px;
}
.section-header h2 { font-size: 26px; color: var(--primary-dark); }
.section-num {
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--primary); color: white;
  font-size: 18px; font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* ── 애니메이션 ── */
@keyframes pop {
  0% { transform: scale(0.7); opacity: 0; }
  60% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes flash {
  0%, 100% { background-color: transparent; }
  50%       { background-color: rgba(39,174,96,0.25); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25%       { transform: translateX(-8px); }
  75%       { transform: translateX(8px); }
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-8px); }
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.5; }
}
@keyframes flow {
  0%   { stroke-dashoffset: 100; }
  100% { stroke-dashoffset: 0; }
}

</style>

    <div class="result-grade" id="gradeDisplay"></div>
    <div id="wrongSection"></div>
    <button class="btn-restart" onclick="restartQuiz()">🔄 처음부터 다시</button>
  </div>

</div>

<script>
// ─── 문제 데이터 ───────────────────────────────────────────────────────────
const QUESTIONS = [
  {
    q: "에너지란 무엇인가요?",
    options: ["물질의 질량", "일을 할 수 있는 능력", "물체의 속도", "빛의 밝기"],
    answer: 1,
    explanation: "에너지는 '일을 할 수 있는 능력'으로 정의해요. 물체를 움직이거나 새 물질을 만들고, 물체의 모양이나 상태를 바꿀 수 있는 능력이에요. 예를 들어 달리는 자동차, 타오르는 불꽃 모두 에너지가 있어요!",
    emoji: "⚡"
  },
  {
    q: "높은 댐에 가득 찬 물이 가진 에너지 형태는?",
    options: ["운동 에너지", "전기 에너지", "위치 에너지", "열 에너지"],
    answer: 2,
    explanation: "높은 곳에 있는 물체는 '위치 에너지'를 가져요. 댐의 물은 아직 움직이지 않지만 높이 때문에 에너지를 갖고 있고, 아래로 떨어지면 운동 에너지로 바뀌어요. 이것이 수력 발전의 원리예요!",
    emoji: "💧"
  },
  {
    q: "다음 중 에너지 변환이 잘못 연결된 것은?",
    options: [
      "태양광 발전: 빛 에너지 → 전기 에너지",
      "풍력 발전: 운동 에너지 → 전기 에너지",
      "화력 발전: 화학 에너지 → 전기 에너지",
      "수력 발전: 전기 에너지 → 위치 에너지"
    ],
    answer: 3,
    explanation: "수력 발전은 '위치 에너지 → 운동 에너지 → 전기 에너지'의 순서로 변환돼요. 전기 에너지가 위치 에너지로 변환되는 것은 반대예요. 나머지 세 개는 모두 올바른 에너지 변환이에요!",
    emoji: "🔄"
  },
  {
    q: "신재생 에너지 중 '신 에너지'에 해당하는 것은?",
    options: ["태양광 에너지", "풍력 에너지", "수소 에너지", "수력 에너지"],
    answer: 2,
    explanation: "'신 에너지'는 복잡한 기술적 응용이 더해진 것으로 수소 에너지, 석탄 액화 및 가스화가 해당해요. 태양광·풍력·수력은 자연 에너지를 그대로 활용하는 '재생 에너지'예요!",
    emoji: "⚗️"
  },
  {
    q: "태양광 발전의 핵심 부품으로, 빛을 전기로 바꾸는 것은?",
    options: ["터빈", "태양 전지판(반도체)", "반사경(집열판)", "연료 전지"],
    answer: 1,
    explanation: "태양광 발전은 반도체로 만든 '태양 전지판'에 빛이 투입되면 광전 효과에 의해 전기가 발생해요. 반사경은 태양열 발전에 사용되고, 터빈은 회전력으로 전기를 만들어요!",
    emoji: "☀️"
  },
  {
    q: "풍력 발전에서 에너지 변환 순서로 옳은 것은?",
    options: [
      "전기 → 기계적 → 운동",
      "운동 → 기계적 → 전기",
      "열 → 운동 → 전기",
      "화학 → 열 → 전기"
    ],
    answer: 1,
    explanation: "풍력 발전: 바람의 '운동 에너지' → 터빈의 '기계적 에너지' → 발전기의 '전기 에너지'로 변환돼요. 바람이 터빈을 돌리면 발전기가 회전하며 전기를 만들어요!",
    emoji: "💨"
  },
  {
    q: "시화호 조력 발전소가 이용하는 에너지는?",
    options: [
      "파도의 상하 운동",
      "밀물과 썰물의 조수 간만차",
      "바닷물의 온도 차",
      "빠른 해류(조류)"
    ],
    answer: 1,
    explanation: "시화호는 '조력 발전소'예요. 조력 발전은 밀물·썰물로 생기는 수위 차(조수 간만차)를 이용해 터빈을 돌려요. 세계 최대 규모(254MW)로 인천 시화호에 있어요!",
    emoji: "🌊"
  },
  {
    q: "수소 연료 전지에서 수소와 산소가 반응한 후 나오는 부산물은?",
    options: ["이산화탄소(CO₂)", "일산화탄소(CO)", "물(H₂O)", "질소(N₂)"],
    answer: 2,
    explanation: "수소 연료 전지는 수소(H₂)와 산소(O₂)를 반응시켜 전기를 얻고, 부산물로 오직 '물(H₂O)'만 나와요. CO₂가 전혀 발생하지 않는 완전 청정 에너지로 현대 넥쏘 같은 수소차에 사용돼요!",
    emoji: "🔬"
  },
  {
    q: "다음 중 신재생 에너지를 사용해야 하는 이유로 가장 적절한 것은?",
    options: [
      "화석 연료가 신재생 에너지보다 비싸서",
      "화석 연료는 고갈 위험이 있고 환경 오염을 일으키기 때문에",
      "신재생 에너지가 더 많은 전기를 만들기 때문에",
      "정부가 의무적으로 사용하도록 강제하기 때문에"
    ],
    answer: 1,
    explanation: "화석 연료(석탄·석유·천연가스)는 사용량이 계속 늘어 고갈 위험이 있고, 태울 때 CO₂가 발생해 지구온난화·대기오염 등 환경 문제를 일으켜요. 신재생 에너지는 고갈 없이 환경을 지킬 수 있는 대안이에요!",
    emoji: "🌍"
  },
  {
    q: "지열 에너지에 대한 설명으로 옳은 것은?",
    options: [
      "태양의 열을 반사경으로 모아 사용한다",
      "지하의 열로 터빈을 돌려 전기를 생산한다",
      "날씨에 따라 발전량이 크게 변한다",
      "주로 해안가에서만 사용 가능하다"
    ],
    answer: 1,
    explanation: "지열 에너지는 지하 고온층의 증기나 온수를 끌어올려 터빈을 돌려 전기를 생산해요. 날씨에 관계없이 24시간 안정적으로 발전할 수 있고, 폭발·화재 위험이 없어 안전해요. 아이슬란드에서는 전력의 30%를 지열로 얻어요!",
    emoji: "🌋"
  }
];

// ─── 상태 변수 ───────────────────────────────────────────────────────────────
let currentIdx   = 0;
let selectedOpt  = null;   // 선택한 보기 인덱스 (null = 미선택)
let answered     = false;  // 이미 답변했는지
let score        = 0;
let wrongAnswers = [];     // { idx, q, correctText }

// ─── 초기 렌더 ───────────────────────────────────────────────────────────────
renderQuestion(currentIdx);

// ─── 키보드 단축키 (Enter = 정답 확인 / 다음 문제, 1~4 = 보기 선택) ──────
document.addEventListener('keydown', (e) => {
  // 결과 화면이 열려 있으면 무시
  const resultVisible = document.getElementById('resultScreen')?.classList.contains('visible');
  if (resultVisible) return;

  const btn = document.getElementById('btnCheck');
  if (!btn) return;

  // 숫자 키(1~4)로 보기 선택
  if (!answered && ['1','2','3','4'].includes(e.key)) {
    const idx = parseInt(e.key, 10) - 1;
    const opt = document.getElementById('opt-' + idx);
    if (opt) {
      e.preventDefault();
      selectOption(idx);
    }
    return;
  }

  // Enter: 비활성 상태가 아닐 때 현재 onclick 핸들러 실행
  if (e.key === 'Enter') {
    if (btn.disabled) return;
    e.preventDefault();
    if (typeof btn.onclick === 'function') {
      btn.onclick();
    } else {
      checkAnswer();
    }
  }
});

function renderQuestion(idx) {
  const q = QUESTIONS[idx];
  selectedOpt = null;
  answered    = false;

  updateProgress(idx);

  const labels = ['①', '②', '③', '④'];
  const optionsHTML = q.options.map((opt, i) => `
    <li class="option-item" id="opt-${i}" onclick="selectOption(${i})">
      <span class="option-marker">${labels[i]}</span>
      <span>${opt}</span>
    </li>
  `).join('');

  const html = `
    <div class="quiz-card" id="quizCard">
      <div class="question-header">
        <div class="q-emoji">${q.emoji}</div>
        <div class="q-meta">
          <span class="q-badge">Q ${idx + 1} / ${QUESTIONS.length}</span>
          <div class="q-text">${q.q}</div>
        </div>
      </div>
      <ul class="options-list" id="optionsList">
        ${optionsHTML}
      </ul>
      <button class="btn-check" id="btnCheck" onclick="checkAnswer()" disabled>
        정답 확인
      </button>
      <div class="explanation-box" id="explanationBox"></div>
    </div>
  `;

  const stage = document.getElementById('quizStage');
  stage.innerHTML = html;
}

// ─── 진행 바 업데이트 ─────────────────────────────────────────────────────────
function updateProgress(idx) {
  const pct = (idx / QUESTIONS.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `Q${idx + 1} / ${QUESTIONS.length}`;
}

// ─── 보기 선택 ────────────────────────────────────────────────────────────────
function selectOption(i) {
  if (answered) return;
  selectedOpt = i;

  document.querySelectorAll('.option-item').forEach((el, idx) => {
    el.classList.toggle('selected', idx === i);
  });

  document.getElementById('btnCheck').disabled = false;
}

// ─── 정답 확인 ────────────────────────────────────────────────────────────────
function checkAnswer() {
  if (selectedOpt === null || answered) return;
  answered = true;

  const q        = QUESTIONS[currentIdx];
  const isCorrect = selectedOpt === q.answer;
  const labels    = ['①', '②', '③', '④'];

  // 모든 보기 비활성화 + 색상 처리
  document.querySelectorAll('.option-item').forEach((el, i) => {
    el.classList.add('disabled');
    el.onclick = null;
    if (i === q.answer) {
      el.classList.remove('selected');
      el.classList.add(isCorrect ? 'correct' : 'reveal-correct');
    }
    if (!isCorrect && i === selectedOpt) {
      el.classList.remove('selected');
      el.classList.add('wrong');
    }
  });

  // 점수 / 오답 기록
  if (isCorrect) {
    score++;
  } else {
    wrongAnswers.push({
      num: currentIdx + 1,
      q: q.q,
      correctText: q.options[q.answer]
    });
  }

  // 해설 박스
  const box = document.getElementById('explanationBox');
  box.innerHTML = `
    <div class="explanation-label ${isCorrect ? 'correct-label' : 'wrong-label'}">
      ${isCorrect ? '✅ 정답이에요!' : '❌ 오답이에요'}
      ${!isCorrect ? `<span style="color:var(--text-muted);font-weight:400">— 정답: <strong style="color:var(--correct)">${labels[q.answer]} ${q.options[q.answer]}</strong></span>` : ''}
    </div>
    <div>${q.explanation}</div>
  `;
  box.classList.add('visible');

  // 버튼 변경
  const btn = document.getElementById('btnCheck');
  btn.disabled  = false;
  btn.classList.add('next-mode');

  if (currentIdx < QUESTIONS.length - 1) {
    btn.textContent = '다음 문제 →';
    btn.onclick = nextQuestion;
  } else {
    btn.textContent = '결과 보기 🎉';
    btn.onclick = showResult;
  }
}

// ─── 다음 문제 ────────────────────────────────────────────────────────────────
function nextQuestion() {
  const card = document.getElementById('quizCard');
  card.classList.add('leaving');
  setTimeout(() => {
    currentIdx++;
    renderQuestion(currentIdx);
  }, 280);
}

// ─── 결과 화면 ────────────────────────────────────────────────────────────────
function showResult() {
  // 퀴즈 스테이지 & 진행 바 숨기기
  document.getElementById('quizStage').style.display   = 'none';
  document.getElementById('progressArea').style.display = 'none';

  // 점수 표시
  document.getElementById('scoreDisplay').textContent = `${score} / ${QUESTIONS.length}`;

  // 등급 계산
  const gradeEl = document.getElementById('gradeDisplay');
  let gradeText, gradeCls;
  if      (score === 10) { gradeText = '🏆 S 등급 — 완벽해요!';         gradeCls = 'grade-s'; }
  else if (score === 9)  { gradeText = '🥇 A+ 등급 — 거의 완벽!';       gradeCls = 'grade-ap'; }
  else if (score === 8)  { gradeText = '🥈 A 등급 — 아주 잘했어요!';    gradeCls = 'grade-a'; }
  else if (score === 7)  { gradeText = '🥉 B 등급 — 잘했어요!';         gradeCls = 'grade-b'; }
  else if (score === 6)  { gradeText = '📗 C 등급 — 노력이 보여요!';     gradeCls = 'grade-c'; }
  else                   { gradeText = '💪 다시 도전해 보세요!';          gradeCls = 'grade-retry'; }

  gradeEl.textContent  = gradeText;
  gradeEl.className    = `result-grade ${gradeCls}`;

  // 틀린 문제 목록
  const wrongSection = document.getElementById('wrongSection');
  if (wrongAnswers.length > 0) {
    const items = wrongAnswers.map(w => `
      <div class="wrong-item">
        <span class="wi-num">Q${w.num}.</span>${w.q}<br>
        <span style="font-size:0.85rem;color:var(--text-muted)">정답:&nbsp;</span>
        <span class="wi-answer">${w.correctText}</span>
      </div>
    `).join('');
    wrongSection.innerHTML = `
      <div class="wrong-list-title">❌ 틀린 문제 (${wrongAnswers.length}개)</div>
      <div class="wrong-list">${items}</div>
    `;
  } else {
    wrongSection.innerHTML = `<p style="color:var(--primary);font-weight:700;margin-bottom:24px;">🎊 모든 문제를 맞혔어요!</p>`;
  }

  document.getElementById('resultScreen').classList.add('visible');
}

// ─── 다시 시작 ────────────────────────────────────────────────────────────────
function restartQuiz() {
  currentIdx   = 0;
  selectedOpt  = null;
  answered     = false;
  score        = 0;
  wrongAnswers = [];

  document.getElementById('resultScreen').classList.remove('visible');
  document.getElementById('quizStage').style.display   = '';
  document.getElementById('progressArea').style.display = '';

  renderQuestion(0);
}
</script>
</body>
</html>
