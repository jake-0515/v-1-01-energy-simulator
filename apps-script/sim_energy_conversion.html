/* ===== V단원. 에너지와 수송 기술의 세계 - 공용 스타일 ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #27ae60;
  --primary-dark: #1e8449;
  --primary-light: #a9dfbf;
  --accent: #f39c12;
  --accent-dark: #d68910;
  --blue: #2980b9;
  --blue-dark: #1a5276;
  --red: #e74c3c;
  --purple: #8e44ad;
  --teal: #16a085;
  --bg: #f0fff4;
  --surface: #ffffff;
  --text: #1a2e1a;
  --text-light: #5d6d5d;
  --border: #b2dfdb;
  --shadow: 0 8px 32px rgba(39, 174, 96, 0.12);
  --shadow-lg: 0 16px 48px rgba(39, 174, 96, 0.22);
}

html, body {
  font-family: 'Pretendard', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  font-size: 16px;
}

h1, h2, h3 { font-weight: 800; letter-spacing: -0.02em; }

/* ── 헤더 ── */
.app-header {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  padding: 20px 32px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.app-header h1 {
  font-size: clamp(17px, 3vw, 26px);
  display: flex; align-items: center; gap: 10px;
}
.app-header .subtitle { font-size: 13px; opacity: 0.88; font-weight: 500; }
.app-header nav a {
  color: white;
  text-decoration: none;
  font-weight: 700;
  padding: 8px 16px;
  border-radius: 999px;
  background: rgba(255,255,255,0.2);
  transition: background 0.2s;
  font-size: 14px;
}
.app-header nav a:hover { background: rgba(255,255,255,0.35); }

/* ── 컨테이너 ── */
.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 32px 24px 80px;
}

/* ── 카드 ── */
.card {
  background: var(--surface);
  border-radius: 24px;
  padding: 28px;
  box-shadow: var(--shadow);
  border: 2px solid var(--border);
}

/* ── 버튼 ── */
.btn {
  background: var(--primary);
  color: white;
  border: none;
  padding: 14px 28px;
  border-radius: 999px;
  font-weight: 800;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  box-shadow: 0 4px 16px rgba(39,174,96,0.3);
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(39,174,96,0.4); }
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn.btn-secondary { background: white; color: var(--primary-dark); border: 2px solid var(--primary); box-shadow: none; }
.btn.btn-accent  { background: var(--accent); box-shadow: 0 4px 16px rgba(243,156,18,0.3); }
.btn.btn-blue    { background: var(--blue);   box-shadow: 0 4px 16px rgba(41,128,185,0.3); }
.btn.btn-red     { background: var(--red);    box-shadow: 0 4px 16px rgba(231,76,60,0.3); }

/* ── 배지 ── */
.badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 700;
  background: var(--primary);
  color: white;
}
.badge.amber  { background: var(--accent); }
.badge.blue   { background: var(--blue); }
.badge.purple { background: var(--purple); }
.badge.red    { background: var(--red); }
.badge.teal   { background: var(--teal); }

/* ── 학습 목표 박스 ── */
.objective-box {
  background: linear-gradient(135deg, #d5f5e3 0%, #a9dfbf 100%);
  border-radius: 20px;
  padding: 24px 28px;
  margin-bottom: 32px;
  border-left: 8px solid var(--primary);
}
.objective-box h2 { color: var(--primary-dark); font-size: 22px; margin-bottom: 12px; }
.objective-box ul { list-style: none; padding: 0; }
.objective-box li {
  padding: 6px 0 6px 30px;
  position: relative;
  font-weight: 600;
  font-size: 16px;
}
.objective-box li::before { content: "🎯"; position: absolute; left: 0; }

/* ── 활동 그리드 ── */
.activity-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

.activity-card {
  background: white;
  border-radius: 24px;
  padding: 28px;
  border: 3px solid var(--border);
  text-decoration: none;
  color: inherit;
  display: block;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}
.activity-card::before {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent, rgba(39,174,96,0.06));
  opacity: 0; transition: opacity 0.25s;
}
.activity-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); border-color: var(--primary); }
.activity-card:hover::before { opacity: 1; }
.activity-card .icon { font-size: 52px; margin-bottom: 14px; display: block; }
.activity-card h3 { font-size: 22px; margin-bottom: 10px; }
.activity-card p { color: var(--text-light); font-size: 15px; line-height: 1.55; }
.activity-card .go { margin-top: 14px; color: var(--primary-dark); font-weight: 700; font-size: 14px; }

/* ── 토스트 ── */
.toast {
  position: fixed; top: 20px; left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: white; padding: 14px 24px;
  border-radius: 999px; box-shadow: var(--shadow-lg);
  font-weight: 700; z-index: 1000; transition: transform 0.3s;
}
.toast.show  { transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--primary-dark); color: white; }
.toast.error   { background: var(--red); color: white; }

/* ── 섹션 헤더 ── */
.section-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 24px;
}
.section-header h2 { font-size: 26px; color: var(--primary-dark); }
.section-num {
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--primary); color: white;
  font-size: 18px; font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* ── 애니메이션 ── */
@keyframes pop {
  0% { transform: scale(0.7); opacity: 0; }
  60% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes flash {
  0%, 100% { background-color: transparent; }
  50%       { background-color: rgba(39,174,96,0.25); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25%       { transform: translateX(-8px); }
  75%       { transform: translateX(8px); }
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-8px); }
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.5; }
}
@keyframes flow {
  0%   { stroke-dashoffset: 100; }
  100% { stroke-dashoffset: 0; }
}

</style>

/* ─────────────────────────────────────────

───────────────────────────────────────── */
let currentPlant = 'wind';
const simTimers = {};   // plantId -> array of timeoutIDs
const simRunning = {};  // plantId -> boolean

/* ─────────────────────────────────────────
   초기화: 모든 패널 렌더
───────────────────────────────────────── */
Object.keys(PLANTS).forEach(id => {
  renderControls(id);
  renderChain(id);
  renderEnv(id);
  renderQuiz(id);
});

/* ─────────────────────────────────────────
   탭 전환
───────────────────────────────────────── */
document.getElementById('tabBar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  const id = btn.dataset.plant;
  if (id === currentPlant) return;

  // 이전 패널 숨기기
  document.getElementById('panel-' + currentPlant).classList.remove('active');
  document.querySelector('.tab-btn.active').classList.remove('active');

  // 새 패널 표시
  currentPlant = id;
  btn.classList.add('active');
  btn.style.background = PLANTS[id].color;
  document.getElementById('panel-' + id).classList.add('active');

  // 환경지수 게이지 리셋 후 재실행 (fade-in 후)
  setTimeout(() => animateGauges(id), 150);
});

// 초기 탭 색상 + 게이지
(function initTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    if (btn.classList.contains('active')) {
      btn.style.background = PLANTS[btn.dataset.plant].color;
    }
    btn.addEventListener('mouseenter', () => {
      if (!btn.classList.contains('active'))
        btn.style.borderColor = PLANTS[btn.dataset.plant].color;
    });
    btn.addEventListener('mouseleave', () => {
      if (!btn.classList.contains('active'))
        btn.style.borderColor = '#ddd';
    });
  });
  setTimeout(() => animateGauges('wind'), 300);
})();

/* ─────────────────────────────────────────
   렌더: 컨트롤 버튼
───────────────────────────────────────── */
function renderControls(id) {
  const p = PLANTS[id];
  const wrap = document.getElementById('controls-' + id);
  wrap.innerHTML = `
    <div class="plant-intro">${p.emoji} <strong>${p.name}</strong> &nbsp;—&nbsp; ${p.desc}</div>
    <button class="btn" id="startBtn-${id}" onclick="startSim('${id}')"
      style="background:${p.color}; box-shadow:0 4px 16px ${p.color}44;">
      ▶ 시뮬레이션 시작
    </button>
    <button class="btn btn-secondary" id="resetBtn-${id}" onclick="resetSim('${id}')">↺ 초기화</button>
  `;
}

/* ─────────────────────────────────────────
   렌더: 에너지 체인
───────────────────────────────────────── */
function renderChain(id) {
  const p = PLANTS[id];
  const wrap = document.getElementById('chain-' + id);
  let html = '';
  p.steps.forEach((s, i) => {
    html += `
      <div class="chain-step" id="step-${id}-${i}" data-idx="${i}">
        <div class="step-num" id="stepnum-${id}-${i}">${i + 1}</div>
        <span class="step-icon">${s.icon}</span>
        <div class="step-name">${s.label}</div>
        <span class="energy-badge" style="background:${s.color}; color:${getBadgeTextColor(s.color)};">${s.type}</span>
      </div>`;
    if (i < p.steps.length - 1) {
      html += `
        <div class="chain-arrow">
          <svg viewBox="0 0 52 28" xmlns="http://www.w3.org/2000/svg">
            <line id="arrowLine-${id}-${i}" class="arrow-line" x1="2" y1="14" x2="42" y2="14"/>
            <polygon id="arrowHead-${id}-${i}" class="arrow-head" points="42,8 52,14 42,20"/>
          </svg>
        </div>`;
    }
  });
  wrap.innerHTML = html;
}

function getBadgeTextColor(hex) {
  // 밝은 색이면 어두운 텍스트
  const bright = ['#ffeaa7', '#fdcb6e', '#dfe6e9'];
  return bright.includes(hex) ? '#333' : 'white';
}

/* ─────────────────────────────────────────
   시뮬레이션 시작
───────────────────────────────────────── */
function startSim(id) {
  if (simRunning[id]) return;
  resetSimState(id);
  simRunning[id] = true;

  const p = PLANTS[id];
  const startBtn = document.getElementById('startBtn-' + id);
  startBtn.disabled = true;
  startBtn.textContent = '▶ 진행 중...';

  p.steps.forEach((s, i) => {
    const t = setTimeout(() => {
      highlightStep(id, i, s);
      if (i === p.steps.length - 1) {
        simRunning[id] = false;
        startBtn.disabled = false;
        startBtn.textContent = '▶ 다시 시작';
      }
    }, i * 1200);
    if (!simTimers[id]) simTimers[id] = [];
    simTimers[id].push(t);
  });
}

function highlightStep(id, idx, step) {
  const p = PLANTS[id];

  // 이전 단계들 비활성화
  p.steps.forEach((_, i) => {
    const el = document.getElementById(`step-${id}-${i}`);
    const num = document.getElementById(`stepnum-${id}-${i}`);
    if (i < idx) {
      el.style.borderColor = p.steps[i].color;
      el.style.background = p.steps[i].color + '22';
      num.style.background = p.steps[i].color;
    } else if (i > idx) {
      el.style.borderColor = '#ddd';
      el.style.background = 'white';
      num.style.background = '#ccc';
    }
  });

  // 현재 단계 강조
  const cur = document.getElementById(`step-${id}-${idx}`);
  cur.style.borderColor = step.color;
  cur.style.background = step.color + '22';
  cur.style.boxShadow = `0 0 0 6px ${step.color}44, 0 8px 32px ${step.color}66`;
  cur.style.transform = 'scale(1.08)';
  const num = document.getElementById(`stepnum-${id}-${idx}`);
  num.style.background = step.color === '#dfe6e9' ? '#888' : step.color;

  // 이전 단계들은 scale 복원
  p.steps.forEach((s, i) => {
    if (i !== idx) {
      const el = document.getElementById(`step-${id}-${i}`);
      el.style.transform = 'scale(1)';
      el.style.boxShadow = '';
    }
  });

  // 화살표 활성화 (현재 인덱스 이전까지)
  for (let i = 0; i < p.steps.length - 1; i++) {
    const line = document.getElementById(`arrowLine-${id}-${i}`);
    const head = document.getElementById(`arrowHead-${id}-${i}`);
    if (line && head) {
      if (i < idx) {
        line.style.stroke = step.color;
        head.style.fill = step.color;
        line.classList.add('active');
      } else {
        line.style.stroke = '#ccc';
        head.style.fill = '#ccc';
        line.classList.remove('active');
      }
    }
  }

  // 설명 패널 업데이트
  const panel = document.getElementById('desc-' + id);
  const text = document.getElementById('desc-' + id + '-text');
  panel.style.borderLeftColor = step.color;
  panel.style.background = `linear-gradient(135deg, ${step.color}18, ${step.color}08)`;
  panel.querySelector('.desc-icon').textContent = step.icon;
  panel.querySelector('.desc-step-label').textContent = `단계 ${idx + 1} / ${p.steps.length} — ${step.type}`;
  text.textContent = step.desc;
}

/* ─────────────────────────────────────────
   초기화
───────────────────────────────────────── */
function resetSim(id) {
  resetSimState(id);
  const startBtn = document.getElementById('startBtn-' + id);
  startBtn.disabled = false;
  startBtn.textContent = '▶ 시뮬레이션 시작';
}

function resetSimState(id) {
  simRunning[id] = false;
  if (simTimers[id]) { simTimers[id].forEach(clearTimeout); simTimers[id] = []; }

  const p = PLANTS[id];
  p.steps.forEach((_, i) => {
    const el = document.getElementById(`step-${id}-${i}`);
    const num = document.getElementById(`stepnum-${id}-${i}`);
    if (el) { el.style.borderColor = '#ddd'; el.style.background = 'white'; el.style.transform = 'scale(1)'; el.style.boxShadow = ''; }
    if (num) num.style.background = '#ccc';
    const line = document.getElementById(`arrowLine-${id}-${i}`);
    const head = document.getElementById(`arrowHead-${id}-${i}`);
    if (line) { line.style.stroke = '#ccc'; line.classList.remove('active'); }
    if (head) head.style.fill = '#ccc';
  });

  const panel = document.getElementById('desc-' + id);
  panel.style.borderLeftColor = '#ccc';
  panel.style.background = 'linear-gradient(135deg, #f8f9fa, #ecf0f1)';
  panel.querySelector('.desc-icon').textContent = '💡';
  panel.querySelector('.desc-step-label').textContent = '안내';
  document.getElementById('desc-' + id + '-text').textContent = '▶ 시뮬레이션 시작 버튼을 눌러 에너지 변환 과정을 확인하세요!';
}

/* ─────────────────────────────────────────
   렌더: 환경 지수
───────────────────────────────────────── */
function renderEnv(id) {
  const p = PLANTS[id];
  const e = p.env;
  const wrap = document.getElementById('env-' + id);
  wrap.innerHTML = `
    <div class="env-section">
      <h3>📊 환경 지수</h3>
      <div class="env-grid">
        <div class="env-card">
          <div class="env-label">🌿 CO₂ 배출 <span id="co2val-${id}">0%</span></div>
          <div class="gauge-track">
            <div class="gauge-fill" id="co2-${id}"
              style="background: ${e.co2 < 30 ? '#27ae60' : e.co2 < 60 ? '#f39c12' : '#e74c3c'};"></div>
          </div>
          <div class="env-note">${e.co2 < 30 ? '✅ 매우 낮음 — 친환경!' : e.co2 < 60 ? '⚠️ 보통 수준' : '❌ 높음 — 환경 부담'}</div>
        </div>
        <div class="env-card">
          <div class="env-label">⚡ 에너지 효율 <span id="effval-${id}">0%</span></div>
          <div class="gauge-track">
            <div class="gauge-fill" id="eff-${id}"
              style="background: ${e.eff >= 70 ? '#27ae60' : e.eff >= 40 ? '#2980b9' : '#e67e22'};"></div>
          </div>
          <div class="env-note">${e.eff >= 70 ? '✅ 매우 높음' : e.eff >= 40 ? '🔵 보통 수준' : '🟠 개선 여지 있음'}</div>
        </div>
        <div class="env-card">
          <div class="env-label">🛡️ 안전성 <span id="safeval-${id}">0%</span></div>
          <div class="gauge-track">
            <div class="gauge-fill" id="safe-${id}"
              style="background: ${e.safe >= 85 ? '#27ae60' : e.safe >= 65 ? '#2980b9' : '#e67e22'};"></div>
          </div>
          <div class="env-note">${e.safe >= 85 ? '✅ 매우 안전' : e.safe >= 65 ? '🔵 비교적 안전' : '⚠️ 관리 필요'}</div>
        </div>
      </div>
    </div>`;
}

function animateGauges(id) {
  const p = PLANTS[id];
  const e = p.env;
  const pairs = [
    ['co2', e.co2], ['eff', e.eff], ['safe', e.safe]
  ];
  pairs.forEach(([key, val]) => {
    const bar = document.getElementById(`${key}-${id}`);
    const label = document.getElementById(`${key}val-${id}`);
    if (!bar || !label) return;
    bar.style.width = '0%';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        bar.style.width = val + '%';
        // 카운트업 애니메이션
        let start = 0;
        const step = () => {
          start += 2;
          if (start >= val) { label.textContent = val + '%'; return; }
          label.textContent = start + '%';
          requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      });
    });
  });
}

/* ─────────────────────────────────────────
   렌더: 퀴즈
───────────────────────────────────────── */
function renderQuiz(id) {
  const q = PLANTS[id].quiz;
  const wrap = document.getElementById('quiz-' + id);
  wrap.innerHTML = `
    <div class="quiz-section">
      <h3>🧪 미니 퀴즈</h3>
      <div class="quiz-subtitle">이 발전소의 에너지 변환 순서는?</div>
      <div class="quiz-question">${q.template}</div>
      <div style="font-size:15px; color:#555; margin-bottom:12px; font-weight:600;">
        ① 번 빈칸에 들어갈 에너지 유형을 입력하세요.
      </div>
      <div class="quiz-input-area">
        <input class="quiz-input" id="quizInput-${id}" type="text"
          placeholder="예) 열 에너지 (Enter로 정답 확인)"
          oninput="clearQuizResult('${id}')"
          onkeydown="if(event.key==='Enter'){event.preventDefault();checkQuiz('${id}');}"/>
        <button class="btn btn-accent" onclick="checkQuiz('${id}')">정답 확인</button>
        <button class="btn btn-secondary" onclick="showHint('${id}')">💡 힌트</button>
      </div>
      <div class="quiz-result" id="quizResult-${id}"></div>
    </div>`;
}

function checkQuiz(id) {
  const input = document.getElementById('quizInput-' + id).value.trim();
  const result = document.getElementById('quizResult-' + id);
  const q = PLANTS[id].quiz;
  const correct = q.blanks[0];

  const normalize = s => s.replace(/\s/g, '').toLowerCase();
  const isCorrect = normalize(input) === normalize(correct);

  result.style.display = 'block';
  if (isCorrect) {
    result.className = 'quiz-result correct';
    result.innerHTML = `🎉 정답이에요! <br>
      <div class="quiz-hint">전체 변환 순서: <strong>${q.answer}</strong></div>`;
  } else {
    result.className = 'quiz-result wrong';
    result.innerHTML = `❌ 다시 생각해보세요! 입력값: "${input}" <br>
      <div class="quiz-hint">힌트: ${q.hint}</div>`;
  }
}

function showHint(id) {
  const result = document.getElementById('quizResult-' + id);
  result.style.display = 'block';
  result.className = 'quiz-result correct';
  result.innerHTML = `💡 힌트: ${PLANTS[id].quiz.hint}<br>
    <div class="quiz-hint">전체 순서: ${PLANTS[id].quiz.answer}</div>`;
}

function clearQuizResult(id) {
  const result = document.getElementById('quizResult-' + id);
  result.style.display = 'none';
}
</script>
