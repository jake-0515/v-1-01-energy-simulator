<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌱 신재생 에너지 탐색기 | V단원 기술</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── 페이지 전용 스타일 ── */
    body { font-size: 18px; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    /* ── 헤더 오버라이드 (teal 테마) ── */
    .app-header {
      background: linear-gradient(135deg, #0e6655 0%, #16a085 60%, #1abc9c 100%);
      box-shadow: 0 3px 16px rgba(22,160,133,0.4);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    /* 필터 버튼 영역 */
    .filter-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .filter-btn {
      padding: 10px 22px;
      border-radius: 999px;
      border: 2px solid var(--border);
      background: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      color: var(--text);
    }
    .filter-btn:hover { border-color: var(--primary); color: var(--primary-dark); }
    .filter-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* ── 메인 레이아웃 ── */
    .explorer-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 28px;
      align-items: start;
    }
    @media (max-width: 900px) {
      .explorer-layout { grid-template-columns: 1fr; }
    }

    /* ── 카드 그리드 ── */
    .energy-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    @media (max-width: 600px) {
      .energy-grid { grid-template-columns: 1fr; }
    }

    .energy-card {
      background: white;
      border-radius: 20px;
      padding: 18px 20px;
      border: 3px solid var(--border);
      cursor: pointer;
      transition: transform 0.22s cubic-bezier(.34,1.56,.64,1), box-shadow 0.22s, border-color 0.22s;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }
    .energy-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: var(--card-color, var(--primary));
    }
    .energy-card:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 14px 36px rgba(0,0,0,0.12);
      border-color: var(--card-color, var(--primary));
    }
    .energy-card.selected {
      border-color: var(--card-color, var(--primary));
      box-shadow: 0 0 0 4px rgba(22,160,133,0.2), 0 8px 24px rgba(0,0,0,0.10);
      background: #f0fff9;
      transform: translateY(-3px);
    }
    .card-emoji {
      font-size: 36px;
      line-height: 1;
      transition: transform 0.3s ease;
    }
    .energy-card:hover .card-emoji { transform: scale(1.2); }
    .energy-card.hidden { display: none; }

    .card-emoji { font-size: 36px; line-height: 1; }
    .card-name {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      line-height: 1.3;
    }
    .card-tag {
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 999px;
      background: var(--card-color, var(--primary));
      color: white;
      align-self: flex-start;
    }
    .card-conversion {
      font-size: 12px;
      color: var(--text-light);
      line-height: 1.4;
    }

    /* ── 상세 패널 ── */
    .detail-panel {
      background: white;
      border-radius: 24px;
      border: 2px solid var(--border);
      box-shadow: var(--shadow);
      padding: 28px;
      position: sticky;
      top: 20px;
      transition: all 0.35s ease;
    }

    .detail-empty {
      text-align: center;
      padding: 40px 0;
      color: var(--text-light);
    }
    .detail-empty .hint-emoji { font-size: 64px; display: block; margin-bottom: 16px; }
    .detail-empty p { font-size: 16px; }

    .detail-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .detail-title-emoji { font-size: 42px; }
    .detail-title-text h2 {
      font-size: 22px;
      font-weight: 800;
    }
    .detail-title-text .tag {
      font-size: 13px;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 999px;
      color: white;
      display: inline-block;
      margin-top: 4px;
    }

    /* SVG 컨테이너 */
    .svg-container {
      background: #f8fbff;
      border-radius: 16px;
      border: 1px solid #ddeef8;
      margin-bottom: 18px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .svg-container svg {
      width: 100%;
      max-width: 340px;
      height: 180px;
    }

    /* 에너지 변환 흐름 */
    .conversion-flow {
      background: linear-gradient(90deg, #e8f8f0, #d5f5e3);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 18px;
      border-left: 5px solid var(--primary);
    }
    .conversion-label { font-size: 12px; font-weight: 600; color: var(--text-light); margin-bottom: 4px; }

    /* 원리 설명 */
    .principle-box {
      background: #fffde7;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 18px;
      border-left: 4px solid var(--accent);
    }
    .principle-box .label { font-size: 12px; font-weight: 700; color: var(--accent-dark); margin-bottom: 4px; }

    /* 장단점 */
    .pros-cons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }
    @media (max-width: 500px) {
      .pros-cons { grid-template-columns: 1fr; }
    }
    .pros-box, .cons-box {
      border-radius: 12px;
      padding: 12px 14px;
    }
    .pros-box { background: #eafaf1; border: 1.5px solid #a9dfbf; }
    .cons-box { background: #fdedec; border: 1.5px solid #f5b7b1; }
    .pros-box h4 { color: #1e8449; font-size: 14px; margin-bottom: 8px; }
    .cons-box h4 { color: #c0392b; font-size: 14px; margin-bottom: 8px; }
    .pros-box li, .cons-box li {
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 4px;
      padding-left: 16px;
      position: relative;
    }
    .pros-box li::before { content: "✓"; position: absolute; left: 0; color: #27ae60; font-weight: 900; }
    .cons-box li::before { content: "✗"; position: absolute; left: 0; color: #e74c3c; font-weight: 900; }

    /* 국내 사례 */
    .example-box {
      background: linear-gradient(135deg, #eaf2ff, #dbeafe);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      margin-bottom: 18px;
      border-left: 4px solid var(--blue);
    }
    .example-box .label { font-size: 12px; font-weight: 700; color: var(--blue-dark); margin-bottom: 4px; }

    /* 환경 지수 게이지 */
    .env-gauges { margin-bottom: 8px; }
    .env-gauges h4 { font-size: 15px; font-weight: 800; margin-bottom: 12px; color: var(--text); }
    .gauge-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .gauge-label { font-size: 13px; font-weight: 700; min-width: 80px; }
    .gauge-track {
      flex: 1;
      height: 14px;
      border-radius: 999px;
      background: #e8eaed;
      overflow: hidden;
    }
    .gauge-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.8s cubic-bezier(.34,1.56,.64,1);
      width: 0%;
    }
    .gauge-fill.green { background: linear-gradient(90deg, #27ae60, #2ecc71); }
    .gauge-fill.blue { background: linear-gradient(90deg, #2980b9, #3498db); }
    .gauge-fill.purple { background: linear-gradient(90deg, #8e44ad, #9b59b6); }
    .gauge-value { font-size: 13px; font-weight: 800; min-width: 36px; text-align: right; }

    /* ── 비교 섹션 ── */
    .compare-section {
      margin-top: 40px;
      background: white;
      border-radius: 24px;
      border: 2px solid var(--border);
      padding: 28px;
      box-shadow: var(--shadow);
    }
    .compare-section h2 {
      font-size: 22px;
      font-weight: 800;
      color: var(--primary-dark);
      margin-bottom: 6px;
    }
    .compare-section .desc {
      font-size: 15px;
      color: var(--text-light);
      margin-bottom: 20px;
    }

    .compare-checkboxes {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }
    .compare-check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 2px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
      font-weight: 700;
      background: white;
    }
    .compare-check-item:hover { border-color: var(--primary); }
    .compare-check-item.checked {
      border-color: var(--primary);
      background: #eafaf1;
    }
    .compare-check-item.disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .compare-check-item input { display: none; }

    .compare-table-wrap {
      overflow-x: auto;
    }
    .compare-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 15px;
    }
    .compare-table th {
      background: var(--primary);
      color: white;
      padding: 12px 16px;
      text-align: center;
      font-weight: 800;
    }
    .compare-table th:first-child { text-align: left; background: var(--primary-dark); border-radius: 8px 0 0 0; }
    .compare-table th:last-child { border-radius: 0 8px 0 0; }
    .compare-table td {
      padding: 10px 16px;
      border-bottom: 1px solid #e8f4ed;
      vertical-align: top;
      line-height: 1.5;
    }
    .compare-table tr:nth-child(even) td { background: #f9fffe; }
    .compare-table td:first-child {
      font-weight: 800;
      color: var(--primary-dark);
      white-space: nowrap;
    }
    .compare-table .pros-cell { color: #1e8449; }
    .compare-table .cons-cell { color: #c0392b; }
    .compare-table ul { padding: 0; list-style: none; margin: 0; }
    .compare-table ul li { padding-left: 14px; position: relative; margin-bottom: 3px; }
    .compare-table .pros-cell li::before { content: "✓"; position: absolute; left: 0; font-weight: 900; }
    .compare-table .cons-cell li::before { content: "✗"; position: absolute; left: 0; font-weight: 900; }
    .compare-empty {
      text-align: center;
      padding: 30px;
      color: var(--text-light);
      font-size: 15px;
    }

    /* 슬라이드 인 애니메이션 */
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(24px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .detail-content { animation: slideInRight 0.3s ease; }

    /* SVG 전용 애니메이션 */
    @keyframes rotateBlade {
      from { transform-origin: 50% 50%; transform: rotate(0deg); }
      to   { transform-origin: 50% 50%; transform: rotate(360deg); }
    }
    @keyframes waterFall {
      0%   { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(40px); opacity: 0; }
    }
    @keyframes riseUp {
      0%   { transform: translateY(20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes electronMove {
      0%   { transform: translateX(0); opacity: 1; }
      100% { transform: translateX(60px); opacity: 0; }
    }
    @keyframes sunRays {
      0%, 100% { transform: rotate(0deg) scale(1); }
      50%       { transform: rotate(15deg) scale(1.1); }
    }
    @keyframes waveTide {
      0%   { transform: translateX(0); }
      50%  { transform: translateX(20px); }
      100% { transform: translateX(0); }
    }
    @keyframes bubbleUp {
      0%   { transform: translateY(0); opacity: 0.8; }
      100% { transform: translateY(-30px); opacity: 0; }
    }
    @keyframes fireFlicker {
      0%, 100% { transform: scaleY(1); opacity: 1; }
      50%       { transform: scaleY(0.8); opacity: 0.7; }
    }
    @keyframes steamRise {
      0%   { transform: translateY(0) scaleX(1); opacity: 0.7; }
      100% { transform: translateY(-25px) scaleX(1.5); opacity: 0; }
    }
    @keyframes dashFlow {
      to { stroke-dashoffset: -20; }
    }

    /* 반응형 폰트 */
    @media (max-width: 600px) {
      body { font-size: 16px; }
      .detail-panel { position: static; }
    }
  </style>
</head>
<body>

<header class="app-header">
  <div>
    <h1>🌱 신재생 에너지 탐색기</h1>
    <div class="subtitle">10가지 신재생 에너지의 원리와 특징을 알아보세요!</div>
  </div>
  <nav><a href="/v-1-01-energy-simulator/index.html">🏠 홈</a></nav>
</header>

<div class="container">

  <!-- 필터 버튼 -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">전체 보기</button>

    <!-- 오른쪽: 상세 패널 -->
    <aside class="detail-panel" id="detailPanel">
      <div class="detail-empty" id="detailEmpty">
        <span class="hint-emoji">👆</span>
        <p>왼쪽 카드를 클릭하면<br>상세 정보가 표시됩니다.</p>
      </div>
      <div id="detailContent" style="display:none"></div>
    </aside>

  </div><!-- end explorer-layout -->

  <!-- 비교 섹션 -->
  <div class="compare-section" id="compareSection">
    <h2>⚖️ 에너지 비교하기</h2>
    <p class="desc">최대 3개의 에너지를 선택하여 장단점을 나란히 비교해보세요.</p>
    <div class="compare-checkboxes" id="compareCheckboxes"></div>
    <div class="compare-table-wrap" id="compareTableWrap">
      <div class="compare-empty">비교할 에너지를 위에서 선택해 주세요.</div>
    </div>
  </div>

</div><!-- end container -->

let selectedId = 'solar_pv';
let currentFilter = 'all';
let compareSelected = new Set();

/* ══════════════════════════════════════
   카드 렌더
══════════════════════════════════════ */
function renderCards(filter) {
  const grid = document.getElementById('energyGrid');
  grid.innerHTML = '';
  ENERGIES.forEach(e => {
    const hidden = filter !== 'all' && e.type !== filter;
    const card = document.createElement('div');
    card.className = 'energy-card' + (e.id === selectedId ? ' selected' : '') + (hidden ? ' hidden' : '');
    card.style.setProperty('--card-color', e.color);
    card.dataset.id = e.id;
    card.innerHTML = `
      <span class="card-emoji">${e.emoji}</span>
      <div class="card-name">${e.name}</div>
      <span class="card-tag">${e.tag}</span>
      <div class="card-conversion">${e.conversion}</div>
    `;
    card.addEventListener('click', () => selectEnergy(e.id));
    grid.appendChild(card);
  });
}

            <div class="gauge-fill blue" id="gauge-eff-${id}" style="width:0%"></div>
          </div>
          <span class="gauge-value" style="color:#2980b9">${env.efficiency}%</span>
        </div>
        <div class="gauge-row">
          <span class="gauge-label">안전성</span>
          <div class="gauge-track">
            <div class="gauge-fill purple" id="gauge-saf-${id}" style="width:0%"></div>
          </div>
          <span class="gauge-value" style="color:#8e44ad">${env.safety}점</span>
        </div>
      </div>
    </div>
  `;

  // 게이지 애니메이션 (약간의 딜레이 후 실행)
  requestAnimationFrame(() => {
    setTimeout(() => {
      const co2El = document.getElementById(`gauge-co2-${id}`);
      const effEl = document.getElementById(`gauge-eff-${id}`);
      const safEl = document.getElementById(`gauge-saf-${id}`);
      if (co2El) co2El.style.width = co2Score + '%';
      if (effEl) effEl.style.width = env.efficiency + '%';
      if (safEl) safEl.style.width = env.safety + '%';
    }, 80);
  });
}

/* ══════════════════════════════════════
   카드 선택
══════════════════════════════════════ */
function selectEnergy(id) {
  selectedId = id;
  // 선택 상태 업데이트
  document.querySelectorAll('.energy-card').forEach(c => {
    c.classList.toggle('selected', c.dataset.id === id);
  });
  renderDetail(id);
}

/* ══════════════════════════════════════
   필터
══════════════════════════════════════ */
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards(currentFilter);
  });
});

/* ══════════════════════════════════════
   비교 체크박스 렌더
══════════════════════════════════════ */
function renderCompareCheckboxes() {
  const container = document.getElementById('compareCheckboxes');
  container.innerHTML = '';
  ENERGIES.forEach(e => {
    const item = document.createElement('label');
    const isChecked = compareSelected.has(e.id);
    const isDisabled = !isChecked && compareSelected.size >= 3;
    item.className = 'compare-check-item' + (isChecked ? ' checked' : '') + (isDisabled ? ' disabled' : '');
    item.innerHTML = `
      <input type="checkbox" ${isChecked ? 'checked' : ''} ${isDisabled ? 'disabled' : ''} data-id="${e.id}">
      <span>${e.emoji} ${e.name}</span>
    `;
    item.querySelector('input').addEventListener('change', (ev) => {
      if (ev.target.checked) {
        if (compareSelected.size < 3) compareSelected.add(e.id);
      } else {
        compareSelected.delete(e.id);
      }
      renderCompareCheckboxes();
      renderCompareTable();
    });
    container.appendChild(item);
  });
}

/* ══════════════════════════════════════
   비교 테이블 렌더
══════════════════════════════════════ */
function renderCompareTable() {
  const wrap = document.getElementById('compareTableWrap');
  if (compareSelected.size === 0) {
    wrap.innerHTML = '<div class="compare-empty">비교할 에너지를 위에서 선택해 주세요.</div>';
    return;
  }
  const selected = ENERGIES.filter(e => compareSelected.has(e.id));

  const headerCols = selected.map(e => `<th>${e.emoji} ${e.name}</th>`).join('');

  const rows = [
    {
      label: '유형',
      gen: (e) => `<td>${e.tag}</td>`
    },
    {
      label: '에너지 변환',
      gen: (e) => `<td style="font-size:13px">${e.conversion}</td>`
    },
    {
      label: '장점',
      gen: (e) => `<td class="pros-cell"><ul>${e.pros.map(p=>`<li>${p}</li>`).join('')}</ul></td>`
    },
    {
      label: '단점',
      gen: (e) => `<td class="cons-cell"><ul>${e.cons.map(c=>`<li>${c}</li>`).join('')}</ul></td>`
    },
    {
      label: 'CO₂ 절감',
      gen: (e) => `<td style="text-align:center;font-weight:800;color:#27ae60">${100 - ENV_DATA[e.id].co2}점</td>`
    },
    {
      label: '발전 효율',
      gen: (e) => `<td style="text-align:center;font-weight:800;color:#2980b9">${ENV_DATA[e.id].efficiency}%</td>`
    },
    {
      label: '안전성',
      gen: (e) => `<td style="text-align:center;font-weight:800;color:#8e44ad">${ENV_DATA[e.id].safety}점</td>`
    },
    {
      label: '국내 사례',
      gen: (e) => `<td style="font-size:13px">${e.example}</td>`
    },
  ];

  const bodyRows = rows.map(row =>
    `<tr><td>${row.label}</td>${selected.map(row.gen).join('')}</tr>`
  ).join('');

  wrap.innerHTML = `
    <table class="compare-table">
      <thead>
        <tr>
          <th>항목</th>
          ${headerCols}
        </tr>
      </thead>
      <tbody>${bodyRows}</tbody>
    </table>
  `;
}

/* ══════════════════════════════════════
   초기화
══════════════════════════════════════ */
renderCards('all');
renderDetail('solar_pv');
renderCompareCheckboxes();
renderCompareTable();
</script>
</body>
</html>
